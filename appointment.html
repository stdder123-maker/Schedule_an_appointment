<!DOCTYPE html>
<html lang="th">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>ดูนัดหมาย</title>
  <style>
    body{
      font-family: Arial, sans-serif;
      background:#f4f6f8;
      margin:0;
      padding:20px;
    }
    .wrap{
      max-width:600px;
      margin:auto;
    }
    .box{
      background:#fff;
      border-radius:12px;
      padding:18px;
      box-shadow:0 2px 10px rgba(0,0,0,.08);
    }
    h2{
      margin-top:0;
      text-align:center;
    }
    .row{
      display:flex;
      gap:10px;
      margin-bottom:16px;
    }
    input{
      flex:1;
      padding:12px;
      font-size:16px;
      border:1px solid #ccc;
      border-radius:8px;
    }
    button{
      padding:12px 16px;
      font-size:16px;
      border:none;
      border-radius:8px;
      cursor:pointer;
      background:#06c755;
      color:#fff;
    }
    .card{
      background:#fff;
      border:1px solid #e5e7eb;
      border-radius:10px;
      padding:14px;
      margin-top:12px;
    }
    .muted{
      color:#666;
      text-align:center;
      margin-top:10px;
    }
  </style>
</head>
<body>
  <div class="wrap">
    <div class="box">
      <h2>นัดหมายของคุณ</h2>

      <div class="row">
        <input type="text" id="userId" placeholder="เช่น นาย สมศักดิ์" />
        <button onclick="loadData()">ค้นหา</button>
      </div>

      <div id="result" class="muted">กรอกชื่อแล้วกดค้นหา</div>
    </div>
  </div>

  <script>
    const API_URL = "https://script.google.com/macros/s/AKfycbzBptD94TabwI898Am9Dod30NTsZa0f6L3SGujYt9E2najZ471YH5vSnkRnUWY-_dLS/exec";

    async function loadData() {
      const userId = document.getElementById("userId").value.trim();
      const resultDiv = document.getElementById("result");

      if (!userId) {
        resultDiv.innerHTML = '<div class="muted">กรุณากรอกชื่อ</div>';
        return;
      }

      resultDiv.innerHTML = '<div class="muted">กำลังโหลด...</div>';

      try {
        const res = await fetch(API_URL + "?userId=" + encodeURIComponent(userId));
        const data = await res.json();

        if (data.message) {
          resultDiv.innerHTML = '<div class="muted">' + data.message + '</div>';
          return;
        }

        if (!Array.isArray(data) || data.length === 0) {
          resultDiv.innerHTML = '<div class="muted">ไม่พบข้อมูล</div>';
          return;
        }

        resultDiv.innerHTML = data.map(item => `
          <div class="card">
            <div><strong>วันที่:</strong> ${item.date}</div>
            <div><strong>รายการ:</strong> ${item.job}</div>
          </div>
        `).join("");
      } catch (err) {
        resultDiv.innerHTML = '<div class="muted">เกิดข้อผิดพลาดในการโหลดข้อมูล</div>';
      }
    }
  </script>
</body>
</html>
